<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Page Not Found | Hotel Confort Arenal</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="shortcut icon" href="/favicon.ico">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <meta name="theme-color" content="#2D5A4A">

    <!-- Preconnect for Performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="dns-prefetch" href="https://www.google-analytics.com">

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <!-- Styles -->
    <link rel="stylesheet" href="/css/styles.css">
    <style>
        .error-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
            background: var(--color-cream);
        }
        .error-content {
            max-width: 600px;
        }
        .error-logo {
            margin-bottom: 2rem;
        }
        .error-logo img {
            max-width: 180px;
            height: auto;
        }
        .error-code {
            font-family: var(--font-display);
            font-size: clamp(6rem, 20vw, 10rem);
            font-weight: 600;
            color: var(--color-primary);
            line-height: 1;
            margin-bottom: 1rem;
        }
        .error-title {
            font-family: var(--font-display);
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            margin-bottom: 1rem;
            color: var(--color-charcoal);
        }
        .error-text {
            font-size: 1.125rem;
            color: var(--color-gray);
            margin-bottom: 2rem;
            line-height: 1.7;
        }
        .error-links {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }
        .error-privacy {
            margin-top: 2rem;
            font-size: 0.875rem;
        }
        .error-privacy a {
            color: var(--color-gray);
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="error-page">
        <div class="error-content">
            <div class="error-logo">
                <img src="/images/brand/logo.png" alt="Hotel Confort Arenal">
            </div>
            <div class="error-code">404</div>
            <h1 class="error-title">Page Not Found</h1>
            <p class="error-text">
                Oops! The page you're looking for doesn't exist or has been moved.
                Don't worry - let's get you back on track to planning your Costa Rica adventure!
            </p>
            <div class="error-links">
                <a href="/" class="btn btn-primary">Go to Homepage</a>
                <a href="/pages/rooms.html" class="btn btn-secondary">View Rooms</a>
                <a href="/pages/contact.html" class="btn btn-secondary">Contact Us</a>
            </div>
            <p class="error-privacy">
                <a href="/pages/privacy.html">Privacy Policy</a>
            </p>
        </div>
    </div>
</body>
</html>
